  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

: url(\"55a42202-ec12-4c28-9e0d-121148a8ac82\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* ============================================================\n   Shelly Said So EDU — COLOR TOKENS\n   \"Flat color only. Thick black outlines. High contrast.\"\n   Core palette is Signature Red / Pitch Black / Pure White.\n   Each sub-brand re-maps the semantic --brand-* tokens.\n   ============================================================ */\n:root {\n  /* ---- Core brand primitives ---- */\n  --ssso-red:        #E31E24; /* Signature Red — energy & passion */\n  --ssso-red-deep:   #B3141A; /* pressed / shadow red */\n  --ssso-red-tint:   #FBE0E1; /* soft red wash for fills */\n  --ink:             #000000; /* Pitch Black — outlines, silhouettes */\n  --ink-soft:        #1A1A1A; /* near-black for long-form body text */\n  --paper:           #FFFFFF; /* Pure White — clarity / negative space */\n  --paper-warm:      #FFFBF4; /* warm off-white page background */\n  --paper-dim:       #F3EFE7; /* muted panel fill */\n\n  /* ---- Bright Mind Collective rainbow (kid/community) ---- */\n  --bmc-yellow:      #F9B233;\n  --bmc-coral:       #EF5B43;\n  --bmc-teal:        #16A89B;\n  --bmc-purple:      #7C4DA0;\n  --bmc-green:       #8CC63E;\n  --bmc-blue:        #29ABE2;\n  --bmc-orange:      #F47B20;\n\n  /* ---- Doom Closet (neon chalk-on-black, Basquiat-raw) ---- */\n  --doom-black:      #0E0E0E; /* chalkboard canvas */\n  --doom-char:       #161616; /* raised panel */\n  --doom-chalk:      #F2F2F2; /* white chalk text */\n  --doom-pink:       #EC1E8C; /* hot magenta brain */\n  --doom-cyan:       #25B7E8; /* electric cyan */\n  --doom-yellow:     #FFE000; /* highlighter yellow */\n  --doom-lime:       #7DD23E; /* acid green */\n  --doom-red:        #ED1C24; /* strike-through red */\n\n  /* ---- Maker Index (woodcut: red triangle + yellow bulb) ---- */\n  --mkr-red:         #E31E24; /* warning-triangle red */\n  --mkr-yellow:      #FFD200; /* lightbulb yellow */\n  --mkr-ink:         #000000; /* woodcut black */\n  --mkr-paper:       #F7F5EF; /* aged print paper */\n  --mkr-line:        #C9C4B8; /* rule / index line */\n\n  /* ---- Functional / semantic ---- */\n  --success:         #2E9E4F;\n  --warning:         #F9B233;\n  --danger:          #E31E24;\n  --info:            #29ABE2;\n\n  /* ============================================================\n     SEMANTIC ALIASES (default = Shelly Said So master brand)\n     Components reference ONLY these so sub-themes can re-skin.\n     ============================================================ */\n  --brand-accent:        var(--ssso-red);\n  --brand-accent-deep:   var(--ssso-red-deep);\n  --brand-accent-tint:   var(--ssso-red-tint);\n  --brand-ink:           var(--ink);\n  --brand-on-accent:     var(--paper);\n\n  --surface-page:        var(--paper-warm);\n  --surface-card:        var(--paper);\n  --surface-panel:       var(--paper-dim);\n  --surface-invert:      var(--ink);\n\n  --text-strong:         var(--ink);\n  --text-body:           var(--ink-soft);\n  --text-muted:          #5A554C;\n  --text-on-invert:      var(--paper);\n  --text-link:           var(--ssso-red);\n\n  --border-ink:          var(--ink);\n}\n\n/* ============================================================\n   SUB-BRAND THEME SCOPES  — set data-brand on any container\n   ============================================================ */\n[data-brand=\"bright-mind\"] {\n  --brand-accent:      var(--bmc-teal);\n  --brand-accent-deep: #0E7A70;\n  --brand-accent-tint: #D8F0ED;\n  --brand-on-accent:   var(--paper);\n  --surface-page:      #FFFDF5;\n  --text-link:         var(--bmc-purple);\n}\n[data-brand=\"doom-closet\"] {\n  --brand-accent:      var(--doom-pink);\n  --brand-accent-deep: #C2156F;\n  --brand-accent-tint: #2A1622;\n  --brand-ink:         var(--doom-chalk);\n  --brand-on-accent:   #0E0E0E;\n  --surface-page:      var(--doom-black);\n  --surface-card:      #1A1A1A;\n  --surface-panel:     #202020;\n  --surface-invert:    var(--doom-chalk);\n  --text-strong:       var(--doom-chalk);\n  --text-body:         #D7D7D7;\n  --text-muted:        #8C8C8C;\n  --text-on-invert:    #0E0E0E;\n  --text-link:         var(--doom-cyan);\n  --border-ink:        var(--doom-chalk);\n}\n[data-brand=\"maker-index\"] {\n  --brand-accent:      var(--mkr-red);\n  --brand-accent-deep: var(--ssso-red-deep);\n  --brand-accent-tint: #FFF4D6;\n  --brand-ink:         var(--mkr-ink);\n  --surface-page:      var(--mkr-paper);\n  --surface-panel:     #ECE9E1;\n  --text-muted:        #5A554C;\n  --text-link:         var(--mkr-red);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Shelly Said So EDU — TYPOGRAPHY TOKENS\n   Display = blocky & \"pumped up\". Script = personal voice.\n   Body = clean geometric sans for legibility.\n   ============================================================ */\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Luckiest Guy', 'Burbank Big Condensed', system-ui, sans-serif;\n  --font-script:  'Dancing Script', 'Segoe Script', cursive;\n  --font-body:    'Montserrat', system-ui, -apple-system, sans-serif;\n\n  /* ---- Weights (Montserrat) ---- */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold:600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n  --fw-black:   900; /* @kind font */\n\n  /* ---- Type scale (1.250 major-third-ish, tuned) ---- */\n  --fs-display:  clamp(3rem, 6vw, 5.5rem); /* @kind font */\n  --fs-h1:       clamp(2.25rem, 4vw, 3.5rem); /* @kind font */\n  --fs-h2:       clamp(1.75rem, 3vw, 2.5rem); /* @kind font */\n  --fs-h3:       1.5rem; /* @kind font */\n  --fs-h4:       1.25rem; /* @kind font */\n  --fs-body-lg:  1.125rem; /* @kind font */\n  --fs-body:     1rem; /* @kind font */\n  --fs-small:    0.875rem; /* @kind font */\n  --fs-tiny:     0.75rem; /* @kind font */\n\n  /* ---- Script accents ---- */\n  --fs-script-lg: clamp(2.5rem, 5vw, 4rem); /* @kind font */\n  --fs-script:    1.75rem; /* @kind font */\n\n  /* ---- Line height ---- */\n  --lh-tight:   1.05; /* @kind font */\n  --lh-snug:    1.2; /* @kind font */\n  --lh-normal:  1.55; /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --ls-display: 0.5px;  /* @kind font */\n  --ls-caps:    0.14em; /* @kind font */\n  --ls-label:   0.06em; /* @kind font */\n}\n\n/* ---- Optional ready-made text roles ---- */\n.ssso-display { font-family: var(--font-display); font-size: var(--fs-display); line-height: var(--lh-tight); letter-spacing: var(--ls-display); text-transform: uppercase; color: var(--text-strong); }\n.ssso-script  { font-family: var(--font-script); font-weight: var(--fw-bold); color: var(--brand-ink); }\n.ssso-caps    { font-family: var(--font-body); font-weight: var(--fw-bold); text-transform: uppercase; letter-spacing: var(--ls-caps); }\n.ssso-body    { font-family: var(--font-body); font-size: var(--fs-body); line-height: var(--lh-normal); color: var(--text-body); }\n<\u002Fstyle>\n<style>/* ============================================================\n   Shelly Said So EDU — SPACING, RADII, BORDERS, SHADOWS\n   The look: thick black outlines + hard \"sticker\" pop shadows\n   (no blur), blobby-rounded capsules, flat fills.\n   ============================================================ */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  24px;\n  --space-6:  32px;\n  --space-7:  48px;\n  --space-8:  64px;\n  --space-9:  96px;\n  --space-10: 128px;\n\n  /* ---- Container widths ---- */\n  --container-narrow: 720px;\n  --container:        1080px;\n  --container-wide:   1320px;\n\n  /* ---- Radii (blobby capsule language) ---- */\n  --radi at';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"55a42202-ec12-4c28-9e0d-121148a8ac82\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"ad0be83b-b1e6-443b-b108-f65ba18a2bc2\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"0018a9de-307f-4714-95e0-70218b5252a8\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"defbf879-a1bb-4bb7-a395-ed02378de9b5\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"6006bb3c-fff5-4f86-a8f6-d7776b4b3c1b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"55a42202-ec12-4c28-9e0d-121148a8ac82\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   Shelly Said So EDU — COLOR TOKENS\n   \"Flat color only. Thick black outlines. High contrast.\"\n   Core palette is Signature Red / Pitch Black / Pure White.\n   Each sub-brand re-maps the semantic --brand-* tokens.\n   ============================================================ */\n:root {\n  /* ---- Core brand primitives ---- */\n  --ssso-red:        #E31E24; /* Signature Red — energy & passion */\n  --ssso-red-deep:   #B3141A; /* pressed / shadow red */\n  --ssso-red-tint:   #FBE0E1; /* soft red wash for fills */\n  --ink:             #000000; /* Pitch Black — outlines, silhouettes */\n  --ink-soft:        #1A1A1A; /* near-black for long-form body text */\n  --paper:           #FFFFFF; /* Pure White — clarity / negative space */\n  --paper-warm:      #FFFBF4; /* warm off-white page background */\n  --paper-dim:       #F3EFE7; /* muted panel fill */\n\n  /* ---- Bright Mind Collective rainbow (kid/community) ---- */\n  --bmc-yellow:      #F9B233;\n  --bmc-coral:       #EF5B43;\n  --bmc-teal:        #16A89B;\n  --bmc-purple:      #7C4DA0;\n  --bmc-green:       #8CC63E;\n  --bmc-blue:        #29ABE2;\n  --bmc-orange:      #F47B20;\n\n  /* ---- Doom Closet (neon chalk-on-black, Basquiat-raw) ---- */\n  --doom-black:      #0E0E0E; /* chalkboard canvas */\n  --doom-char:       #161616; /* raised panel */\n  --doom-chalk:      #F2F2F2; /* white chalk text */\n  --doom-pink:       #EC1E8C; /* hot magenta brain */\n  --doom-cyan:       #25B7E8; /* electric cyan */\n  --doom-yellow:     #FFE000; /* highlighter yellow */\n  --doom-lime:       #7DD23E; /* acid green */\n  --doom-red:        #ED1C24; /* strike-through red */\n\n  /* ---- Maker Index (woodcut: red triangle + yellow bulb) ---- */\n  --mkr-red:         #E31E24; /* warning-triangle red */\n  --mkr-yellow:      #FFD200; /* lightbulb yellow */\n  --mkr-ink:         #000000; /* woodcut black */\n  --mkr-paper:       #F7F5EF; /* aged print paper */\n  --mkr-line:        #C9C4B8; /* rule / index line */\n\n  /* ---- Functional / semantic ---- */\n  --success:         #2E9E4F;\n  --warning:         #F9B233;\n  --danger:          #E31E24;\n  --info:            #29ABE2;\n\n  /* ============================================================\n     SEMANTIC ALIASES (default = Shelly Said So master brand)\n     Components reference ONLY these so sub-themes can re-skin.\n     ============================================================ */\n  --brand-accent:        var(--ssso-red);\n  --brand-accent-deep:   var(--ssso-red-deep);\n  --brand-accent-tint:   var(--ssso-red-tint);\n  --brand-ink:           var(--ink);\n  --brand-on-accent:     var(--paper);\n\n  --surface-page:        var(--paper-warm);\n  --surface-card:        var(--paper);\n  --surface-panel:       var(--paper-dim);\n  --surface-invert:      var(--ink);\n\n  --text-strong:         var(--ink);\n  --text-body:           var(--ink-soft);\n  --text-muted:          #5A554C;\n  --text-on-invert:      var(--paper);\n  --text-link:           var(--ssso-red);\n\n  --border-ink:          var(--ink);\n}\n\n/* ============================================================\n   SUB-BRAND THEME SCOPES  — set data-brand on any container\n   ============================================================ */\n[data-brand=\"bright-mind\"] {\n  --brand-accent:      var(--bmc-teal);\n  --brand-accent-deep: #0E7A70;\n  --brand-accent-tint: #D8F0ED;\n  --brand-on-accent:   var(--paper);\n  --surface-page:      #FFFDF5;\n  --text-link:         var(--bmc-purple);\n}\n[data-brand=\"doom-closet\"] {\n  --brand-accent:      var(--doom-pink);\n  --brand-accent-deep: #C2156F;\n  --brand-accent-tint: #2A1622;\n  --brand-ink:         var(--doom-chalk);\n  --brand-on-accent:   #0E0E0E;\n  --surface-page:      var(--doom-black);\n  --surface-card:      #1A1A1A;\n  --surface-panel:     #202020;\n  --surface-invert:    var(--doom-chalk);\n  --text-strong:       var(--doom-chalk);\n  --text-body:         #D7D7D7;\n  --text-muted:        #8C8C8C;\n  --text-on-invert:    #0E0E0E;\n  --text-link:         var(--doom-cyan);\n  --border-ink:        var(--doom-chalk);\n}\n[data-brand=\"maker-index\"] {\n  --brand-accent:      var(--mkr-red);\n  --brand-accent-deep: var(--ssso-red-deep);\n  --brand-accent-tint: #FFF4D6;\n  --brand-ink:         var(--mkr-ink);\n  --surface-page:      var(--mkr-paper);\n  --surface-panel:     #ECE9E1;\n  --text-muted:        #5A554C;\n  --text-link:         var(--mkr-red);\n}\n\n/* ============================================================\n   Shelly Said So EDU — TYPOGRAPHY TOKENS\n   Display = blocky & \"pumped up\". Script = personal voice.\n   Body = clean geometric sans for legibility.\n   ============================================================ */\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Luckiest Guy', 'Burbank Big Condensed', system-ui, sans-serif;\n  --font-script:  'Dancing Script', 'Segoe Script', cursive;\n  --font-body:    'Montserrat', system-ui, -apple-system, sans-serif;\n\n  /* ---- Weights (Montserrat) ---- */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold:600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n  --fw-black:   900; /* @kind font */\n\n  /* ---- Type scale (1.250 major-third-ish, tuned) ---- */\n  --fs-display:  clamp(3rem, 6vw, 5.5rem); /* @kind font */\n  --fs-h1:       clamp(2.25rem, 4vw, 3.5rem); /* @kind font */\n  --fs-h2:       clamp(1.75rem, 3vw, 2.5rem); /* @kind font */\n  --fs-h3:       1.5rem; /* @kind font */\n  --fs-h4:       1.25rem; /* @kind font */\n  --fs-body-lg:  1.125rem; /* @kind font */\n  --fs-body:     1rem; /* @kind font */\n  --fs-small:    0.875rem; /* @kind font */\n  --fs-tiny:     0.75rem; /* @kind font */\n\n  /* ---- Script accents ---- */\n  --fs-script-lg: clamp(2.5rem, 5vw, 4rem); /* @kind font */\n  --fs-script:    1.75rem; /* @kind font */\n\n  /* ---- Line height ---- */\n  --lh-tight:   1.05; /* @kind font */\n  --lh-snug:    1.2; /* @kind font */\n  --lh-normal:  1.55; /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --ls-display: 0.5px;  /* @kind font */\n  --ls-caps:    0.14em; /* @kind font */\n  --ls-label:   0.06em; /* @kind font */\n}\n\n/* ---- Optional ready-made text roles ---- */\n.ssso-display { font-family: var(--font-display); font-size: var(--fs-display); line-height: var(--lh-tight); letter-spacing: var(--ls-display); text-transform: uppercase; color: var(--text-strong); }\n.ssso-script  { font-family: var(--font-script); font-weight: var(--fw-bold); color: var(--brand-ink); }\n.ssso-caps    { font-family: var(--font-body); font-weight: var(--fw-bold); text-transform: uppercase; letter-spacing: var(--ls-caps); }\n.ssso-body    { font-family: var(--font-body); font-size: var(--fs-body); line-height: var(--lh-normal); color: var(--text-body); }\n\n/* ============================================================\n   Shelly Said So EDU — SPACING, RADII, BORDERS, SHADOWS\n   The look: thick black outlines + hard \"sticker\" pop shadows\n   (no blur), blobby-rounded capsules, flat fills.\n   ============================================================ */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  24px;\n  --space-6:  32px;\n  --space-7:  48px;\n  --space-8:  64px;\n  --space-9:  96px;\n  --space-10: 128px;\n\n  /* ---- Container widths ---- */\n  --container-narrow: 720px;\n  --container:        1080px;\n  --container-wide:   1320px;\n\n  /* ---- Radii (blobby capsule language) ---- */\n  --radius-sm:   8px;\n  --radius-md:   14px;\n  --radius-lg:   24px;\n  --radius-xl:   36px;\n  --radius-pill: 999px;\n\n  /* ---- Borders: the locked cross-brand rule = thick black outline ---- */\n  --border-w:       3px;\n  --border-w-bold:  4px;\n  --border-w-heavy: 6px;\n  --border:        var(--border-w) solid var(--border-ink);\n  --border-bold:   var(--border-w-bold) solid var(--border-ink);\n  --border-heavy:  var(--border-w-heavy) solid var(--border-ink);\n\n  /* ---- Hard pop shadows (offset, zero blur — sticker/comic feel) ---- */\n  --shadow-pop-sm: 3px 3px 0 var(--border-ink);\n  --shadow-pop:    5px 5px 0 var(--border-ink);\n  --shadow-pop-lg: 8px 8px 0 var(--border-ink);\n  --shadow-pop-accent: 5px 5px 0 var(--brand-accent);\n\n  /* ---- Motion (snappy, bouncy — \"pumped up\" energy) ---- */\n  --ease-pop:  cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --ease-out:  cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --dur-fast:  120ms; /* @kind other */\n  --dur:       200ms; /* @kind other */\n  --dur-slow:  340ms; /* @kind other */\n}\n\n<\u002Fstyle>\n<script src=\"25c97a07-7e58-4ca7-b031-c211b1c74227\"><\u002Fscript>\n<style>\n html, body { margin: 0; padding: 0; }\n body { background: #0E0E0E; font-family: var(--font-body); -webkit-font-smoothing: antialiased; }\n * { box-sizing: border-box; }\n button { font-family: var(--font-body); }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: #0E0E0E; color: #F2F2F2; font-family: var(--font-body);\">\n <div style=\"max-width: 1040px; margin: 0 auto; padding: clamp(16px, 3vw, 28px);\">\n\n  <header style=\"text-align: center;\">\n   <div style=\"display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 16px;\">\n    <a href=\"https://www.shellysaidsoedu.com/ISTE26/\" style=\"text-decoration: none; background: transparent; color: #fff; border: 3px solid #fff; border-radius: 999px; padding: 7px 14px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; font-size: .72rem;\">← ISTE Hub<\u002Fa>\n   <\u002Fdiv>\n   <div style=\"display: flex; justify-content: center; gap: 11px; flex-wrap: wrap; margin-bottom: 14px;\">\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-yellow); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-pink); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-cyan); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-lime); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-yellow); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-pink); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-cyan); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-lime); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-yellow); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-pink); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-cyan); border: 2px solid #000; display: block;\"><\u002Fspan>\n    <span style=\"width: 13px; height: 13px; border-radius: 50%; background: var(--doom-lime); border: 2px solid #000; display: block;\"><\u002Fspan>\n   <\u002Fdiv>\n   <div style=\"font-family: var(--font-script); color: var(--doom-yellow); font-size: clamp(1.3rem, 3vw, 2rem); line-height: 1;\">tonight's episode<\u002Fdiv>\n   <h1 style=\"font-family: var(--font-display); font-size: clamp(2.2rem, 7vw, 4.4rem); margin: 2px 0 0; color: #fff; text-transform: uppercase; line-height: .92; letter-spacing: .5px;\">Late-Night <span style=\"color: var(--doom-pink);\">Learning<\u002Fspan><\u002Fh1>\n   <p style=\"margin: 10px 0 0; color: #bbb; font-size: .95rem; letter-spacing: .02em;\">Jimmy Fallon-inspired classroom games · with <strong style=\"color: #fff;\">Shelly Veron<\u002Fstrong><\u002Fp>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ isMenu }}\" hint-placeholder-val=\"{{ true }}\">\n   <div style=\"margin-top: 26px;\">\n    <p style=\"text-align: center; max-width: 60ch; margin: 0 auto 16px; color: #cfcfcf; line-height: 1.55;\">Welcome to the show! Pick a game to throw on the big screen — each one runs live. The goal: get everyone talking, laughing, and learning without even realizing it.<\u002Fp>\n    <div style=\"max-width: 74ch; margin: 0 auto 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px;\">\n      <div style=\"background: #161616; border: 2px solid #2a2a2a; border-radius: 16px; padding: 14px 18px; color: #cfcfcf; line-height: 1.45; font-size: .9rem;\"><strong style=\"color: var(--doom-yellow); text-transform: uppercase; letter-spacing: .06em; font-size: .76rem;\">Start here<\u002Fstrong><br>A great community builder to open with — kids get to know the process, and each other.<\u002Fdiv>\n      <div style=\"background: #161616; border: 2px solid #2a2a2a; border-radius: 16px; padding: 14px 18px; color: #cfcfcf; line-height: 1.45; font-size: .9rem;\"><strong style=\"color: var(--doom-cyan); text-transform: uppercase; letter-spacing: .06em; font-size: .76rem;\">Hook or review<\u002Fstrong><br>Run any of these at the start or end of a lesson cycle — a hook to open, or a review to close.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px;\">\n\n     <button onclick=\"{{ openWheel }}\" style=\"text-align: left; cursor: pointer; background: #161616; border: 4px solid var(--doom-pink); border-radius: 24px; box-shadow: 5px 5px 0 #000; padding: 22px; color: #fff; transition: transform .12s var(--ease-pop), box-shadow .12s var(--ease-pop);\" style-hover=\"transform: translate(-3px,-3px); box-shadow: 8px 8px 0 #000;\">\n      <div style=\"font-family: var(--font-display); font-size: 1.55rem; color: var(--doom-pink); text-transform: uppercase; line-height: 1;\">Wheel of Chance<\u002Fdiv>\n      <p style=\"margin: 8px 0 14px; color: #cfcfcf; line-height: 1.45; font-size: .92rem;\">Spin for a random accent + scenario, then introduce yourself in character.<\u002Fp>\n      <span style=\"display: inline-block; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; font-size: .78rem; background: var(--doom-pink); color: #000; border: 3px solid #000; border-radius: 999px; padding: 8px 16px;\">Play ▸<\u002Fspan>\n     <\u002Fbutton>\n\n     <button onclick=\"{{ openWord }}\" style=\"text-align: left; cursor: pointer; background: #161616; border: 4px solid var(--doom-cyan); border-radius: 24px; box-shadow: 5px 5px 0 #000; padding: 22px; color: #fff; transition: transform .12s var(--ease-pop), box-shadow .12s var(--ease-pop);\" style-hover=\"transform: translate(-3px,-3px); box-shadow: 8px 8px 0 #000;\">\n      <div style=\"font-family: var(--font-display); font-size: 1.55rem; color: var(--doom-cyan); text-transform: uppercase; line-height: 1;\">Word Sneak<\u002Fdiv>\n      <p style=\"margin: 8px 0 14px; color: #cfcfcf; line-height: 1.45; font-size: .92rem;\">Sneak three random words into conversation before the timer runs out.<\u002Fp>\n      <span style=\"display: inline-block; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; font-size: .78rem; background: var(--doom-cyan); color: #000; border: 3px solid #000; border-radius: 999px; padding: 8px 16px;\">Play ▸<\u002Fspan>\n     <\u002Fbutton>\n\n     <button onclick=\"{{ openYoga }}\" style=\"text-align: left; cursor: pointer; background: #161616; border: 4px solid var(--doom-lime); border-radius: 24px; box-shadow: 5px 5px 0 #000; padding: 22px; color: #fff; transition: transform .12s var(--ease-pop), box-shadow .12s var(--ease-pop);\" style-hover=\"transform: translate(-3px,-3px); box-shadow: 8px 8px 0 #000;\">\n      <div style=\"font-family: var(--font-display); font-size: 1.55rem; color: var(--doom-lime); text-transform: uppercase; line-height: 1;\">Brain Yoga<\u002Fdiv>\n      <p style=\"margin: 8px 0 14px; color: #cfcfcf; line-height: 1.45; font-size: .92rem;\">Two random objects, sixty seconds — invent a brand-new product and pitch it.<\u002Fp>\n      <span style=\"display: inline-block; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; font-size: .78rem; background: var(--doom-lime); color: #000; border: 3px solid #000; border-radius: 999px; padding: 8px 16px;\">Play ▸<\u002Fspan>\n     <\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; max-width: 700px; margin: 16px auto 0;\">\n\n     <button onclick=\"{{ openTerm }}\" style=\"text-align: left; cursor: pointer; background: #161616; border: 4px solid var(--doom-yellow); border-radius: 24px; box-shadow: 5px 5px 0 #000; padding: 22px; color: #fff; transition: transform .12s var(--ease-pop), box-shadow .12s var(--ease-pop);\" style-hover=\"transform: translate(-3px,-3px); box-shadow: 8px 8px 0 #000;\">\n      <div style=\"font-family: var(--font-display); font-size: 1.55rem; color: var(--doom-yellow); text-transform: uppercase; line-height: 1;\">Term Talk<\u002Fdiv>\n      <p style=\"margin: 8px 0 14px; color: #cfcfcf; line-height: 1.45; font-size: .92rem;\">Pick the five key terms of the day. Each student works their own term into real conversation all session long.<\u002Fp>\n      <span style=\"display: inline-block; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; font-size: .78rem; background: var(--doom-yellow); color: #000; border: 3px solid #000; border-radius: 999px; padding: 8px 16px;\">Play ▸<\u002Fspan>\n     <\u002Fbutton>\n\n     <button onclick=\"{{ openReal }}\" style=\"text-align: left; cursor: pointer; background: #161616; border: 4px solid var(--bmc-coral); border-radius: 24px; box-shadow: 5px 5px 0 #000; padding: 22px; color: #fff; transition: transform .12s var(--ease-pop), box-shadow .12s var(--ease-pop)\" style-hover=\"transform: translate(-3px,-3px); box-shadow: 8px 8px 0 #000;\">\n      <div style=\"font-family: var(--font-display); font-size: 1.55rem; color: var(--bmc-coral); text-transform: uppercase; line-height: 1;\">Real or Not Real<\u002Fdiv>\n      <p style=\"margin: 8px 0 14px; color: #cfcfcf; line-height: 1.45; font-size: .92rem;\">Real tech job, or totally made up? Vote, then open the case for the truth.<\u002Fp>\n      <span style=\"display: inline-block; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; font-size: .78rem; background: var(--bmc-coral); color: #000; border: 3px solid #000; border-radius: 999px; padding: 8px 16px;\">Play ▸<\u002Fspan>\n     <\u002Fbutton>\n\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ gWheel }}\">\n   <section style=\"margin-top: 22px;\">\n    <button onclick=\"{{ setMenu }}\" style=\"cursor: pointer; background: transparent; color: #fff; border: 3px solid #fff; border-radius: 999px; padding: 8px 16px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; font-size: .74rem;\">← Lineup<\u002Fbutton>\n    <h2 style=\"font-family: var(--font-display); color: var(--doom-pink); font-size: clamp(1.8rem, 5vw, 2.8rem); text-transform: uppercase; margin: 14px 0 6px; line-height: 1;\">Wheel of Chance<\u002Fh2>\n    <p style=\"color: #cfcfcf; line-height: 1.5; margin: 0 0 16px; max-width: 64ch;\">Spin both wheels. Introduce yourself in that accent, acting out that scenario — biggest laugh wins the round.<\u002Fp>\n    <div style=\"background: #161616; border: 2px solid var(--doom-pink); border-radius: 16px; padding: 16px 18px; margin: 0 0 18px; max-width: 64ch; color: #cfcfcf; line-height: 1.5; font-size: .92rem;\">\n     <strong style=\"color: var(--doom-pink); text-transform: uppercase; letter-spacing: .06em; font-size: .78rem;\">Make your own wheel<\u002Fstrong>\n     <p style=\"margin: 6px 0 12px;\">Build a custom spinner with <strong>Wheel of Names<\u002Fstrong> and load it with your content — vocabulary terms, review questions, student names, math problems, discussion prompts, or historical figures to introduce in character.<\u002Fp>\n     <a href=\"https://wheelofnames.com/\" target=\"_blank\" rel=\"noopener\" style=\"display: inline-block; text-decoration: none; font-family: var(--font-display); font-size: .95rem; text-transform: uppercase; letter-spacing: .03em; color: #000; background: var(--doom-pink); border: 3px solid #000; border-radius: 999px; box-shadow: 3px 3px 0 #000; padding: 9px 18px;\">Open Wheel of Names →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; align-items: flex-start;\">\n     <div style=\"text-align: center;\">\n      <div style=\"font-family: var(--font-display); color: var(--doom-pink); font-size: 1.1rem; text-transform: uppercase; margin-bottom: 10px; letter-spacing: .04em;\">Accent<\u002Fdiv>\n      <div style=\"position: relative; width: min(64vw, 256px); aspect-ratio: 1; margin: 0 auto;\">\n       <div style=\"position: absolute; left: 50%; top: -6px; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 28px solid var(--doom-yellow); z-index: 3;\"><\u002Fdiv>\n       <div style=\"position: absolute; inset: 0; transition: transform 4.2s cubic-bezier(0.17, 0.67, 0.12, 0.99); transform: rotate({{ accAngle }}deg);\">{{ accWheel }}<\u002Fdiv>\n      <\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"text-align: center;\">\n      <div style=\"font-family: var(--font-display); color: var(--doom-cyan); font-size: 1.1rem; text-transform: uppercase; margin-bottom: 10px; letter-spacing: .04em;\">Scenario<\u002Fdiv>\n      <div style=\"position: relative; width: min(64vw, 256px); aspect-ratio: 1; margin: 0 auto;\">\n       <div style=\"position: absolute; left: 50%; top: -6px; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 28px solid var(--doom-yellow); z-index: 3;\"><\u002Fdiv>\n       <div style=\"position: absolute; inset: 0; transition: transform 4.2s cubic-bezier(0.17, 0.67, 0.12, 0.99); transform: rotate({{ scAngle }}deg);\">{{ scWheel }}<\u002Fdiv>\n      <\u002Fdiv>\n     <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align: center; margin-top: 22px;\">\n     <button onclick=\"{{ spin }}\" style=\"cursor: pointer; font-family: var(--font-display); font-size: clamp(1.2rem, 3.5vw, 1.8rem); text-transform: uppercase; letter-spacing: .04em; color: #000; background: var(--doom-yellow); border: 4px solid #000; border-radius: 999px; box-shadow: 5px 5px 0 #000; padding: 14px 38px;\">{{ spinLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n    <sc-if value=\"{{ hasResult }}\">\n     <div style=\"margin: 22px auto 0; max-width: 600px; background: #161616; border: 4px solid var(--doom-yellow); border-radius: 22px; box-shadow: 5px 5px 0 #000; padding: 22px; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; text-align: center;\">\n      <div>\n       <div style=\"font-family: var(--font-body); font-weight: 800; font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: var(--doom-pink);\">Accent<\u002Fdiv>\n       <div style=\"font-family: var(--font-display); color: #fff; font-size: clamp(1.4rem, 4vw, 2.1rem); text-transform: uppercase; line-height: 1.05;\">{{ accRes }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width: 3px; background: #333; align-self: stretch;\"><\u002Fdiv>\n      <div>\n       <div style=\"font-family: var(--font-body); font-weight: 800; font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: var(--doom-cyan);\">Scenario<\u002Fdiv>\n       <div style=\"font-family: var(--font-display); color: #fff; font-size: clamp(1.4rem, 4vw, 2.1rem); text-transform: uppercase; line-height: 1.05;\">{{ scRes }}<\u002Fdiv>\n      <\u002Fdiv>\n     <\u002Fdiv>\n    <\u002Fsc-if>\n   <\u002Fsection>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ gWord }}\">\n   <section style=\"margin-top: 22px;\">\n    <button onclick=\"{{ setMenu }}\" style=\"cursor: pointer; background: transparent; color: #fff; border: 3px solid #fff; border-radius: 999px; padding: 8px 16px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; font-size: .74rem;\">← Lineup<\u002Fbutton>\n    <h2 style=\"font-family: var(--font-display); color: var(--doom-cyan); font-size: clamp(1.8rem, 5vw, 2.8rem); text-transform: uppercase; margin: 14px 0 6px; line-height: 1;\">Word Sneak<\u002Fh2>\n    <p style=\"color: #cfcfcf; line-height: 1.5; margin: 0 0 16px; max-width: 64ch;\">Sneak all three words into conversation as naturally as you can before time's up — without anyone calling you out.<\u002Fp>\n    <div style=\"background: #161616; border: 2px solid var(--doom-cyan); border-radius: 18px; padding: 18px 20px; margin: 0 0 20px; color: #cfcfcf; line-height: 1.5; font-size: .92rem;\">\n     <strong style=\"color: var(--doom-cyan); text-transform: uppercase; letter-spacing: .06em; font-size: .78rem;\">Keep your words secret<\u002Fstrong>\n     <p style=\"margin: 6px 0 12px;\">Nobody else should see your words! Pull them up privately on <strong style=\"color:#fff;\">your own phone<\u002Fstrong> — then sneak them into the conversation without getting caught.<\u002Fp>\n     <div style=\"display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 14px;\">\n      <img src=\"8204bbad-d2a1-4fe2-91fe-092657ede5ca\" alt=\"Scan to play Word Sneak on your phone\" style=\"width: 116px; height: 116px; flex: none; background: #fff; border: 3px solid #000; border-radius: 12px; padding: 6px;\">\n      <div style=\"font-weight: 700; color: #fff; max-width: 32ch;\">Pull this up on your own phone to play Word Sneak.<\u002Fdiv>\n     <\u002Fdiv>\n     <strong style=\"color: var(--doom-cyan); text-transform: uppercase; letter-spacing: .06em; font-size: .78rem;\">Two ways to play<\u002Fstrong>\n     <ul style=\"margin: 6px 0 12px; padding-left: 18px; display: flex; flex-direction: column; gap: 5px;\">\n      <li><strong style=\"color:#fff;\">Funny words<\u002Fstrong> — sneak in goofy words while you talk about the actual content.<\u002Fli>\n      <li><strong style=\"color:#fff;\">Content words<\u002Fstrong> — sneak your vocabulary or terms into a regular conversation or general topic.<\u002Fli>\n     <\u002Ful>\n     <p style=\"margin: 0 0 14px;\"><strong style=\"color:#fff;\">As a hook,<\u002Fstrong> hand out the definitions with the words. <strong style=\"color:#fff;\">As a review,<\u002Fstrong> don't — make them recall the meaning.<\u002Fp>\n     <div style=\"display: flex; gap: 10px; flex-wrap: wrap;\">\n      <a href=\"https://www.google.com/search?q=funniest+words+in+the+english+language\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;text-decoration:none;font-family:var(--font-display);font-size:.9rem;text-transform:uppercase;letter-spacing:.03em;color:#000;background:var(--doom-yellow);border:3px solid #000;border-radius:999px;box-shadow:3px 3px 0 #000;padding:8px 16px;\">Funniest English words →<\u002Fa>\n      <a href=\"https://www.dictionary.com/e/slang/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;text-decoration:none;font-family:var(--font-display);font-size:.9rem;text-transform:uppercase;letter-spacing:.03em;color:#000;background:var(--doom-lime);border:3px solid #000;border-radius:999px;box-shadow:3px 3px 0 #000;padding:8px 16px;\">Generational slang →<\u002Fa>\n      <a href=\"https://www.youtube.com/results?search_query=jimmy+fallon+word+sneak+bryan+cranston\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;text-decoration:none;font-family:var(--font-display);font-size:.9rem;text-transform:uppercase;letter-spacing:.03em;color:#fff;background:var(--ssso-red);border:3px solid #000;border-radius:999px;box-shadow:3px 3px 0 #000;padding:8px 16px;\">▸ Fallon × Cranston clip<\u002Fa>\n     <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px;\">\n     <div style=\"font-family: var(--font-display); color: #000; background: var(--doom-cyan); border: 4px solid #000; border-radius: 16px; box-shadow: 5px 5px 0 #000; padding: 22px 10px; font-size: clamp(1.2rem, 3.5vw, 1.9rem); text-transform: uppercase; text-align: center; line-height: 1.05;\">{{ w1 }}<\u002Fdiv>\n     <div style=\"font-family: var(--font-display); color: #000; background: var(--doom-cyan); border: 4px solid #000; border-radius: 16px; box-shadow: 5px 5px 0 #000; padding: 22px 10px; font-size: clamp(1.2rem, 3.5vw, 1.9rem); text-transform: uppercase; text-align: center; line-height: 1.05;\">{{ w2 }}<\u002Fdiv>\n     <div style=\"font-family: var(--font-display); color: #000; background: var(--doom-cyan); border: 4px solid #000; border-radius: 16px; box-shadow: 5px 5px 0 #000; padding: 22px 10px; font-size: clamp(1.2rem, 3.5vw, 1.9rem); text-transform: uppercase; text-align: center; line-height: 1.05;\">{{ w3 }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align: center; margin: 22px 0 10px;\">\n     <div style=\"font-family: var(--font-display); font-size: clamp(3rem, 13vw, 6rem); line-height: 1; color: {{ timeColor }};\">{{ wsTime }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;\">\n     <button onclick=\"{{ toggleTimer }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-body); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #000; background: var(--doom-lime); border: 4px solid #000; border-radius: 999px; box-shadow: 4px 4px 0 #000; padding: 12px 26px;\">{{ wsLabel }}<\u002Fbutton>\n     <button onclick=\"{{ resetTimer }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-body); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #fff; background: transparent; border: 4px solid #fff; border-radius: 999px; padding: 12px 26px;\">Reset<\u002Fbutton>\n     <button onclick=\"{{ dealWords }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-body); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #000; background: var(--doom-cyan); border: 4px solid #000; border-radius: 999px; box-shadow: 4px 4px 0 #000; padding: 12px 26px;\">Deal new words<\u002Fbutton>\n    <\u002Fdiv>\n   <\u002Fsection>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ gYoga }}\">\n   <section style=\"margin-top: 22px;\">\n    <button onclick=\"{{ setMenu }}\" style=\"cursor: pointer; background: transparent; color: #fff; border: 3px solid #fff; border-radius: 999px; padding: 8px 16px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; font-size: .74rem;\">← Lineup<\u002Fbutton>\n    <h2 style=\"font-family: var(--font-display); color: var(--doom-lime); font-size: clamp(1.8rem, 5vw, 2.8rem); text-transform: uppercase; margin: 14px 0 6px; line-height: 1;\">Brain Yoga<\u002Fh2>\n    <p style=\"color: #cfcfcf; line-height: 1.5; margin: 0 0 14px; max-width: 64ch;\">Invent a brand-new product that combines these two objects. Sixty seconds on the clock — then pitch it. What idea can you get started in 60 seconds?<\u002Fp>\n    <div style=\"background: #161616; border: 2px solid var(--doom-lime); border-radius: 16px; padding: 14px 18px; margin: 0 0 16px; max-width: 64ch; color: #cfcfcf; line-height: 1.5; font-size: .92rem;\">When another group lands on your idea, it isn't stealing — it means <strong style=\"color:#fff;\">they think like you.<\u002Fstrong> Partner up, or build off each other. That's how the room becomes a safe space for ideas.<\u002Fdiv>\n    <div style=\"display: flex; flex-wrap: wrap; gap: 10px; margin: 0 0 18px;\">\n     <a href=\"https://www.instagram.com/p/CPI1LAJnspW/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;text-decoration:none;font-family:var(--font-display);font-size:.9rem;text-transform:uppercase;letter-spacing:.03em;color:#000;background:var(--doom-lime);border:3px solid #000;border-radius:999px;box-shadow:3px 3px 0 #000;padding:8px 16px;\">▸ Jason Reynolds on creative thinking<\u002Fa>\n     <a href=\"https://express.adobe.com/publishedV2/urn:aaid:sc:US:c7101812-be12-53e7-9ab2-fa6869fa7d94?promoid=Y69SGM5H&amp;sdid=C4SZ2FYJ&amp;mv=other\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;text-decoration:none;font-family:var(--font-display);font-size:.9rem;text-transform:uppercase;letter-spacing:.03em;color:#000;background:#fff;border:3px solid #000;border-radius:999px;box-shadow:3px 3px 0 #000;padding:8px 16px;\">▸ See a Brain Yoga example<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display: flex; gap: 16px; justify-content: center; align-items: center; flex-wrap: wrap;\">\n     <div style=\"font-family: var(--font-display); color: #000; background: var(--doom-lime); border: 4px solid #000; border-radius: 16px; box-shadow: 5px 5px 0 #000; padding: 22px 24px; font-size: clamp(1.3rem, 4vw, 2rem); text-transform: uppercase; text-align: center; line-height: 1.05; min-width: 200px; display: flex; flex-direction: column; align-items: center; gap: 12px;\">{{ o1IconEl }}<span>{{ o1 }}<\u002Fspan><\u002Fdiv>\n     <div style=\"font-family: var(--font-display); color: var(--doom-lime); font-size: clamp(2rem, 6vw, 3rem);\">+<\u002Fdiv>\n     <div style=\"font-family: var(--font-display); color: #000; background: var(--doom-lime); border: 4px solid #000; border-radius: 16px; box-shadow: 5px 5px 0 #000; padding: 22px 24px; font-size: clamp(1.3rem, 4vw, 2rem); text-transform: uppercase; text-align: center; line-height: 1.05; min-width: 200px; display: flex; flex-direction: column; align-items: center; gap: 12px;\">{{ o2IconEl }}<span>{{ o2 }}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align: center; margin: 18px 0 6px;\">\n     <div style=\"font-family: var(--font-display); font-size: clamp(2.4rem, 11vw, 5rem); line-height: 1; color: {{ timeColor }};\">{{ wsTime }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;\">\n     <button onclick=\"{{ toggleTimer }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-body); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #000; background: var(--doom-yellow); border: 4px solid #000; border-radius: 999px; box-shadow: 4px 4px 0 #000; padding: 12px 26px;\">{{ wsLabel }}<\u002Fbutton>\n     <button onclick=\"{{ resetTimer }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-body); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #fff; background: transparent; border: 4px solid #fff; border-radius: 999px; padding: 12px 26px;\">Reset<\u002Fbutton>\n     <button onclick=\"{{ rollObjects }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-body); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #000; background: var(--doom-lime); border: 4px solid #000; border-radius: 999px; box-shadow: 4px 4px 0 #000; padding: 12px 26px;\">New objects<\u002Fbutton>\n    <\u002Fdiv>\n   <\u002Fsection>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ gTerm }}\">\n   <section style=\"margin-top: 22px;\">\n    <button onclick=\"{{ setMenu }}\" style=\"cursor: pointer; background: transparent; color: #fff; border: 3px solid #fff; border-radius: 999px; padding: 8px 16px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; font-size: .74rem;\">← Lineup<\u002Fbutton>\n    <h2 style=\"font-family: var(--font-display); color: var(--doom-yellow); font-size: clamp(1.8rem, 5vw, 2.8rem); text-transform: uppercase; margin: 14px 0 6px; line-height: 1;\">Term Talk<\u002Fh2>\n    <p style=\"color: #cfcfcf; line-height: 1.5; margin: 0 0 16px; max-width: 64ch;\">An individual challenge that runs the whole session. Pick the <strong style=\"color:#fff;\">five most important terms of the day<\u002Fstrong> — everyone works their own term into real conversation across the class period, naturally, so no one notices. Collect them physically as you catch them used right.<\u002Fp>\n    <div style=\"background: #161616; border: 2px solid var(--doom-yellow); border-radius: 18px; padding: 18px 20px; margin: 0 0 20px;\">\n     <div style=\"font-family: var(--font-body); font-weight: 800; font-size: .78rem; letter-spacing: .06em; text-transform: uppercase; color: var(--doom-yellow); margin-bottom: 10px;\">The five terms of the day<\u002Fdiv>\n     <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px;\">\n      <input value=\"{{ d1 }}\" oninput=\"{{ setD1 }}\" placeholder=\"Term 1\" style=\"padding: 12px 14px; border: 3px solid #000; border-radius: 12px; background: #fff; color: #000; font-family: var(--font-display); font-size: 1.02rem; text-transform: uppercase; width: 100%;\">\n      <input value=\"{{ d2 }}\" oninput=\"{{ setD2 }}\" placeholder=\"Term 2\" style=\"padding: 12px 14px; border: 3px solid #000; border-radius: 12px; background: #fff; color: #000; font-family: var(--font-display); font-size: 1.02rem; text-transform: uppercase; width: 100%;\">\n      <input value=\"{{ d3 }}\" oninput=\"{{ setD3 }}\" placeholder=\"Term 3\" style=\"padding: 12px 14px; border: 3px solid #000; border-radius: 12px; background: #fff; color: #000; font-family: var(--font-display); font-size: 1.02rem; text-transform: uppercase; width: 100%;\">\n      <input value=\"{{ d4 }}\" oninput=\"{{ setD4 }}\" placeholder=\"Term 4\" style=\"padding: 12px 14px; border: 3px solid #000; border-radius: 12px; background: #fff; color: #000; font-family: var(--font-display); font-size: 1.02rem; text-transform: uppercase; width: 100%;\">\n      <input value=\"{{ d5 }}\" oninput=\"{{ setD5 }}\" placeholder=\"Term 5\" style=\"padding: 12px 14px; border: 3px solid #000; border-radius: 12px; background: #fff; color: #000; font-family: var(--font-display); font-size: 1.02rem; text-transform: uppercase; width: 100%;\">\n     <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align: center;\">\n     <div style=\"font-family: var(--font-body); font-weight: 800; font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; color: #888; margin-bottom: 8px;\">Draw a term to hand out<\u002Fdiv>\n     <div style=\"display: inline-block; font-family: var(--font-display); color: #000; background: var(--doom-yellow); border: 4px solid #000; border-radius: 18px; box-shadow: 5px 5px 0 #000; padding: 18px 34px; font-size: clamp(1.6rem, 5vw, 2.6rem); text-transform: uppercase; line-height: 1;\">{{ ttTerm }}<\u002Fdiv>\n     <div style=\"margin-top: 16px;\">\n      <button onclick=\"{{ drawTerm }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-body); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #000; background: var(--doom-yellow); border: 4px solid #000; border-radius: 999px; box-shadow: 4px 4px 0 #000; padding: 12px 26px;\">Draw a term<\u002Fbutton>\n     <\u002Fdiv>\n     <p style=\"color: #888; font-size: .85rem; margin: 14px auto 0; max-width: 54ch; line-height: 1.5;\">Give each student a term to carry all session. Pulls from your five above — or from a general bank if they are left blank.<\u002Fp>\n    <\u002Fdiv>\n   <\u002Fsection>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ gReal }}\">\n   <section style=\"margin-top: 22px;\">\n    <button onclick=\"{{ setMenu }}\" style=\"cursor: pointer; background: transparent; color: #fff; border: 3px solid #fff; border-radius: 999px; padding: 8px 16px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; font-size: .74rem;\">← Lineup<\u002Fbutton>\n    <h2 style=\"font-family: var(--font-display); color: var(--bmc-coral); font-size: clamp(1.8rem, 5vw, 2.8rem); text-transform: uppercase; margin: 14px 0 6px; line-height: 1;\">Real or Not Real<\u002Fh2>\n    <p style=\"color: #cfcfcf; line-height: 1.5; margin: 0 0 18px; max-width: 64ch;\">Every title here came off a real tech job board — but some sound completely made up. Vote: <strong style=\"color:#fff;\">real job, or not real?<\u002Fstrong> Then open the case.<\u002Fp>\n    <div style=\"max-width: 640px; margin: 0 auto; background: #161616; border: 4px solid var(--bmc-coral); border-radius: 24px; box-shadow: 6px 6px 0 #000; padding: clamp(22px, 4vw, 34px); text-align: center;\">\n     <div style=\"width: 120px; height: 86px; margin: 0 auto 18px; background: linear-gradient(#caa53a, #9c7c1e); border: 4px solid #000; border-radius: 12px; position: relative; box-shadow: 4px 4px 0 #000;\">\n      <div style=\"position: absolute; left: 50%; top: -10px; transform: translateX(-50%); width: 46px; height: 16px; border: 4px solid #000; border-bottom: none; border-radius: 12px 12px 0 0; background: #caa53a;\"><\u002Fdiv>\n      <div style=\"position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 26px; height: 16px; background: #000; border-radius: 3px;\"><\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"font-family: var(--font-display); color: #fff; font-size: clamp(2rem, 7vw, 3.4rem); text-transform: uppercase; line-height: 1;\">{{ ronWord }}<\u002Fdiv>\n     <sc-if value=\"{{ ronNotRevealed }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 22px;\">\n       <button onclick=\"{{ ronReveal }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-display); font-size: 1.1rem; text-transform: uppercase; letter-spacing: .03em; color: #000; background: var(--doom-lime); border: 4px solid #000; border-radius: 999px; box-shadow: 4px 4px 0 #000; padding: 12px 26px;\">We say REAL<\u002Fbutton>\n       <button onclick=\"{{ ronReveal }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-display); font-size: 1.1rem; text-transform: uppercase; letter-spacing: .03em; color: #000; background: var(--doom-pink); border: 4px solid #000; border-radius: 999px; box-shadow: 4px 4px 0 #000; padding: 12px 26px;\">We say NOT REAL<\u002Fbutton>\n      <\u002Fdiv>\n     <\u002Fsc-if>\n     <sc-if value=\"{{ ronRevealed }}\">\n      <div style=\"margin-top: 22px;\">\n       <div style=\"display: inline-block; font-family: var(--font-display); font-size: clamp(1.4rem, 5vw, 2.2rem); text-transform: uppercase; color: #000; background: {{ ronVerdictColor }}; border: 4px solid #000; border-radius: 14px; padding: 10px 24px; box-shadow: 4px 4px 0 #000;\">{{ ronVerdict }}<\u002Fdiv>\n       <p style=\"color: #d7d7d7; font-size: 1.05rem; line-height: 1.5; margin: 16px auto 0; max-width: 48ch;\">{{ ronDef }}<\u002Fp>\n       <p style=\"color: #cfcfcf; font-size: .96rem; line-height: 1.5; margin: 10px auto 0; max-width: 50ch;\">{{ ronNote }}<\u002Fp>\n       <button onclick=\"{{ ronNext }}\" style=\"cursor: pointer; margin-top: 18px; min-height: 48px; font-family: var(--font-body); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: #000; background: var(--bmc-coral); border: 4px solid #000; border-radius: 999px; box-shadow: 4px 4px 0 #000; padding: 12px 30px;\">Next case →<\u002Fbutton>\n      <\u002Fdiv>\n     <\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"text-align: center; margin-top: 18px;\">\n     <sc-if value=\"{{ ronTwistHidden }}\" hint-placeholder-val=\"{{ true }}\">\n      <button onclick=\"{{ showTwist }}\" style=\"cursor: pointer; min-height: 48px; font-family: var(--font-body); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--bmc-coral); background: transparent; border: 3px solid var(--bmc-coral); border-radius: 999px; padding: 12px 26px;\">Reveal the twist ▾<\u002Fbutton>\n     <\u002Fsc-if>\n     <sc-if value=\"{{ ronTwist }}\">\n      <div style=\"max-width: 640px; margin: 0 auto; text-align: left; background: #000; border: 3px solid var(--bmc-coral); border-radius: 18px; padding: 18px 22px; color: #eee; line-height: 1.55;\">\n       <strong style=\"color: var(--bmc-coral); text-transform: uppercase; letter-spacing: .06em; font-size: .8rem;\">The twist<\u002Fstrong>\n       <p style=\"margin: 6px 0 0; font-size: .96rem;\">They are <strong style=\"color:#fff;\">all real.<\u002Fstrong> The titles keep changing — full-stack engineer, crypto curator, whatever is next — but the skills underneath do not. <strong style=\"color:#fff;\">Leader, engineer, manager, architect, analyst<\u002Fstrong> — build those and you are ready for whatever context shows up in front of them.<\u002Fp>\n      <\u002Fdiv>\n     <\u002Fsc-if>\n    <\u002Fdiv>\n   <\u002Fsection>\n  <\u002Fsc-if>\n\n  <div style=\"text-align: center; margin: 40px 0 10px; color: #555; font-size: .8rem; letter-spacing: .04em;\">Shelly Said So EDU · ISTE 2026<\u002Fdiv>\n\n <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n WORDS = ['penguin','avocado','tornado','spatula','glitter','dinosaur','bagpipe','quicksand','marshmallow','accordion','kerfuffle','noodle','cactus','rhombus','umbrella','hiccup','flamingo','pretzel','submarine','disco'];\n OBJECTS = ['cell phone','hair dryer','desk lamp','computer mouse','spool of thread','microphone','vacuum','headphones','scrub brush','light bulb','cassette tape','oven mitt','TV remote','mop','box fan'];\n OBJ_ICONS = {'cell phone':'assets/brainyoga/brainyoga-1.png','hair dryer':'assets/brainyoga/brainyoga-2.png','desk lamp':'assets/brainyoga/brainyoga-3.png','computer mouse':'assets/brainyoga/brainyoga-4.png','spool of thread':'assets/brainyoga/brainyoga-5.png','microphone':'assets/brainyoga/brainyoga-6.png','vacuum':'assets/brainyoga/brainyoga-7.png','headphones':'assets/brainyoga/brainyoga-8.png','scrub brush':'assets/brainyoga/brainyoga-9.png','light bulb':'assets/brainyoga/brainyoga-10.png','cassette tape':'assets/brainyoga/brainyoga-11.png','oven mitt':'assets/brainyoga/brainyoga-12.png','TV remote':'assets/brainyoga/brainyoga-13.png','mop':'assets/brainyoga/brainyoga-14.png','box fan':'assets/brainyoga/brainyoga-15.png'};\n TERMS = ['photosynthesis','metaphor','hypothesis','democracy','denominator','inference','ecosystem','perimeter','onomatopoeia','variable','sediment','protagonist','symbiosis','equilibrium','alliteration','quotient','ratio','revolution','adaptation','syntax'];\n ACCENTS = ['British','Pirate','Surfer','Robot','Valley Girl','News Anchor','Cowboy','Whisper'];\n SCENARIOS = ['Order pizza','Long division','Your weekend','Give directions','Weather report','Cooking show','Nature doc','Pep talk'];\n WHEEL_COLORS = ['#EC1E8C','#25B7E8','#FFE000','#7DD23E','#EF5B43','#25B7E8','#FFE000','#7DD23E'];\n JOBS = [\n  { title: 'Full Stack Engineer', desc: 'Builds both the front end users see and the back end that powers it.', note: 'Real. One person, the whole stack, front to back.' },\n  { title: 'Crypto Curator', desc: 'Selects and manages digital assets and NFT collections for a fund or collection.', note: 'Real. As crypto grew, so did the job of curating it.' },\n  { title: 'Growth Hacker', desc: 'Runs rapid experiments across product and marketing to grow users fast.', note: 'Real. A startup staple for over a decade.' },\n  { title: 'Scrum Master', desc: 'Coaches a team through the Agile scrum process and clears their roadblocks.', note: 'Real. A standard role on most software teams.' },\n  { title: 'Developer Advocate', desc: 'A coder whose job is to teach, support, and champion other developers.', note: 'Real. Part engineer, part teacher.' },\n  { title: 'Data Wrangler', desc: 'Cleans, organizes, and reshapes messy data so it can actually be used.', note: 'Real. The backbone of every data team.' },\n  { title: 'Prompt Engineer', desc: 'Designs the instructions that get the best results out of AI models.', note: 'Real, and brand new.' },\n  { title: 'Site Reliability Engineer', desc: 'Keeps massive systems online, fast, and recovering from failure on their own.', note: 'Real. The term was coined at Google.' },\n  { title: 'Forward Deployed Engineer', desc: 'An engineer embedded directly with customers to build solutions on site.', note: 'Real. The job goes wherever the client is.' },\n  { title: 'Chief Happiness Officer', desc: 'Leads workplace culture, morale, and employee well-being.', note: 'Real. Yes, it is a real executive title.' },\n ];\n\n state = {\n  game: null,\n  wsWords: [], wsTime: 150, wsRunning: false,\n  byObjects: [],\n  ttTerm: '\\u2014', ttDayTerms: ['', '', '', '', ''],\n  accAngle: 0, scAngle: 0, accRes: null, scRes: null, spinning: false,\n  ronIndex: 0, ronRevealed: false, ronTwist: false,\n };\n\n componentWillUnmount() { clearInterval(this._t); clearTimeout(this._st); }\n\n pick(arr, n) { const c = [...arr]; const out = []; while (out.length < n && c.length) { out.push(c.splice(Math.floor(Math.random() * c.length), 1)[0]); } return out; }\n\n setGame(g) {\n  this.setState({ game: g });\n  if (g === 'wordsneak' && this.state.wsWords.length === 0) this.dealWords();\n  if (g === 'brainyoga' && this.state.byObjects.length === 0) this.rollObjects();\n  if (g === 'termtalk' && this.state.ttTerm === '\\u2014') this.drawTerm();\n }\n\n dealWords() { clearInterval(this._t); this.setState({ wsWords: this.pick(this.WORDS, 3), wsTime: 150, wsRunning: false }); }\n toggleTimer() {\n  if (this.state.wsRunning) { clearInterval(this._t); this.setState({ wsRunning: false }); return; }\n  if (this.state.wsTime <= 0) this.setState({ wsTime: this.dur() });\n  this.setState({ wsRunning: true });\n  clearInterval(this._t);\n  this._t = setInterval(() => {\n   this.setState(s => { if (s.wsTime <= 1) { clearInterval(this._t); return { wsTime: 0, wsRunning: false }; } return { wsTime: s.wsTime - 1 }; });\n  }, 1000);\n }\n resetTimer() { clearInterval(this._t); this.setState({ wsTime: this.dur(), wsRunning: false }); }\n\n rollObjects() { clearInterval(this._t); this.setState({ byObjects: this.pick(this.OBJECTS, 2), wsTime: 60, wsRunning: false }); }\n drawTerm() { const day = this.state.ttDayTerms.filter(t => t.trim()); const pool = day.length ? day : this.TERMS; this.setState({ ttTerm: this.pick(pool, 1)[0] }); }\n setDayTerm(i, v) { this.setState(s => { const a = [...s.ttDayTerms]; a[i] = v; return { ttDayTerms: a }; }); }\n scoreA(d) { this.setState(s => ({ ttA: Math.max(0, s.ttA + d) })); }\n scoreB(d) { this.setState(s => ({ ttB: Math.max(0, s.ttB + d) })); }\n\n spin() {\n  if (this.state.spinning) return;\n  const n = this.ACCENTS.length, seg = 360 / n;\n  const ai = Math.floor(Math.random() * n), si = Math.floor(Math.random() * n);\n  const calc = (cur, i) => { const targetMod = ((360 - (i * seg + seg / 2)) % 360 + 360) % 360; const delta = ((targetMod - (cur % 360)) % 360 + 360) % 360; return cur + 360 * 6 + delta; };\n  this.setState({ accAngle: calc(this.state.accAngle, ai), scAngle: calc(this.state.scAngle, si), spinning: true, accRes: null, scRes: null });\n  clearTimeout(this._st);\n  this._st = setTimeout(() => { this.setState({ spinning: false, accRes: this.ACCENTS[ai], scRes: this.SCENARIOS[si] }); }, 4300);\n }\n\n ronReveal() { this.setState({ ronRevealed: true }); }\n ronNext() { this.setState(s => ({ ronIndex: (s.ronIndex + 1) % this.JOBS.length, ronRevealed: false })); }\n\n buildWheel(items, colors) {\n  const R = 138, cx = 150, cy = 150, seg = 360 / items.length;\n  const rad = (a) => (a - 90) * Math.PI / 180;\n  const parts = [];\n  parts.push(React.createElement('circle', { key: 'bg', cx, cy, r: R, fill: '#000' }));\n  items.forEach((it, i) => {\n   const a0 = i * seg, a1 = (i + 1) * seg;\n   const x0 = cx + R * Math.cos(rad(a0)), y0 = cy + R * Math.sin(rad(a0));\n   const x1 = cx + R * Math.cos(rad(a1)), y1 = cy + R * Math.sin(rad(a1));\n   parts.push(React.createElement('path', { key: 'p' + i, d: `M${cx},${cy} L${x0.toFixed(2)},${y0.toFixed(2)} A${R},${R} 0 0 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z`, fill: colors[i % colors.length], stroke: '#000', strokeWidth: 3 }));\n   const am = a0 + seg / 2, rl = R * 0.62;\n   const lx = cx + rl * Math.cos(rad(am)), ly = cy + rl * Math.sin(rad(am));\n   parts.push(React.createElement('text', { key: 't' + i, x: lx, y: ly, fill: '#000', fontFamily: 'Montserrat, sans-serif', fontWeight: 800, fontSize: 12, textAnchor: 'middle', dominantBaseline: 'middle', transform: `rotate(${am} ${lx.toFixed(2)} ${ly.toFixed(2)})` }, it));\n  });\n  parts.push(React.createElement('circle', { key: 'ring', cx, cy, r: R, fill: 'none', stroke: '#000', strokeWidth: 5 }));\n  parts.push(React.createElement('circle', { key: 'hub', cx, cy, r: 18, fill: '#000', stroke: '#fff', strokeWidth: 3 }));\n  return React.createElement('svg', { viewBox: '0 0 300 300', width: '100%', height: '100%', style: { display: 'block' } }, parts);\n }\n\n dur() { return this.state.game === 'brainyoga' ? 60 : 150; }\n\n fmt(s) { const m = Math.floor(s / 60), ss = s % 60; return m + ':' + String(ss).padStart(2, '0'); }\n\n renderVals() {\n  const s = this.state;\n  const cur = this.JOBS[s.ronIndex];\n  return {\n   isMenu: s.game === null,\n   gWheel: s.game === 'wheel', gWord: s.game === 'wordsneak', gYoga: s.game === 'brainyoga', gTerm: s.game === 'termtalk', gReal: s.game === 'realornot',\n   setMenu: () => this.setState({ game: null }),\n   openWheel: () => this.setGame('wheel'), openWord: () => this.setGame('wordsneak'), openYoga: () => this.setGame('brainyoga'), openTerm: () => this.setGame('termtalk'), openReal: () => this.setGame('realornot'),\n   w1: s.wsWords[0] || '', w2: s.wsWords[1] || '', w3: s.wsWords[2] || '',\n   wsTime: this.fmt(s.wsTime), wsLabel: s.wsRunning ? 'Pause' : 'Start',\n   timeColor: s.wsTime <= 10 ? '#EC1E8C' : '#FFE000',\n   dealWords: () => this.dealWords(), toggleTimer: () => this.toggleTimer(), resetTimer: () => this.resetTimer(),\n   o1: s.byObjects[0] || '', o2: s.byObjects[1] || '', o1IconEl: s.byObjects[0] ? React.createElement('img', { src: this.OBJ_ICONS[s.byObjects[0]], alt: '', style: { width: 96, height: 96, objectFit: 'contain' } }) : null, o2IconEl: s.byObjects[1] ? React.createElement('img', { src: this.OBJ_ICONS[s.byObjects[1]], alt: '', style: { width: 96, height: 96, objectFit: 'contain' } }) : null, rollObjects: () => this.rollObjects(),\n   ttTerm: s.ttTerm, drawTerm: () => this.drawTerm(),\n   d1: s.ttDayTerms[0], d2: s.ttDayTerms[1], d3: s.ttDayTerms[2], d4: s.ttDayTerms[3], d5: s.ttDayTerms[4],\n   setD1: e => this.setDayTerm(0, e.target.value), setD2: e => this.setDayTerm(1, e.target.value), setD3: e => this.setDayTerm(2, e.target.value), setD4: e => this.setDayTerm(3, e.target.value), setD5: e => this.setDayTerm(4, e.target.value),\n   accWheel: this.buildWheel(this.ACCENTS, this.WHEEL_COLORS), scWheel: this.buildWheel(this.SCENARIOS, this.WHEEL_COLORS),\n   accAngle: s.accAngle, scAngle: s.scAngle, spin: () => this.spin(), spinLabel: s.spinning ? 'Spinning\\u2026' : 'Spin both!',\n   hasResult: !!s.accRes, accRes: s.accRes || '', scRes: s.scRes || '',\n   ronWord: cur.title, ronDef: cur.desc, ronRevealed: s.ronRevealed, ronNotRevealed: !s.ronRevealed,\n   ronReveal: () => this.ronReveal(), ronNext: () => this.ronNext(),\n   ronTwist: s.ronTwist, ronTwistHidden: !s.ronTwist, showTwist: () => this.setState({ ronTwist: true }),\n   ronVerdict: 'REAL JOB', ronVerdictColor: '#7DD23E', ronNote: cur.note,\n  };\n }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
